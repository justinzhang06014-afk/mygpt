services:
  ainexus-entry:
    build: .
    image: ai-nexus-hermes:latest
    container_name: ainexus-entry
    ports:
      - "8643:8643"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./hermes_core_data_test:/opt/data
    environment:
      # 測試方便用：子容器也對外開一個隨機 port 讓瀏覽器直接開 Swagger。
      # 正式環境拿掉這行——子容器不需要、也不該直接暴露給外部。
      - PUBLISH_CHILD_PORTS=true
      # 走 Phison 正式端點：不設定 LLM_PROVIDER 就是這條路（config.py/services.py
      # 的預設分支），PHISON_API_KEY 有預設值（見 config.py），要換成不同 key 才需要覆寫。
      - PHISON_API_KEY=${PHISON_API_KEY:-AINX-F78D2FCD53915EE37BD0871392FFBFFAF648C53C388950FC6A1F2ED8C534B249}
      - LLM_BASE_URL=https://ainexus.phison.com/api/external/v1
      - LLM_MODEL=Qwen/Qwen3.6-35B-A3B-FP8
      # 有真的同事 orchestrator 網址時在這裡填，會自動切換 runtime_manager.py 的建容器方式
      # - ORCHESTRATOR_URL=http://your-orchestrator-host:port
    networks:
      - ainexus-test-net

networks:
  ainexus-test-net:
    name: ainexus-test-net
